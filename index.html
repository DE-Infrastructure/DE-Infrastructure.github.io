<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DE Infrastructure Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      padding: 30px 0 5px 0;
    }
    header h1 {
      font-size: 38px;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.23);
    }
    header p {
      font-size: 18px;
      opacity: 0.9;
    }
    .search-block {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .search-block input[type="text"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #bbb;
      min-width: 240px;
      font-size: 16px;
    }
    .group-title {
      font-size: 21px;
      font-weight: 700;
      margin: 32px 0 8px 0;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 1px 1px 6px #4443;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }
    .card {
      background: white;
      border-radius: 12px;
      min-width: 270px;
      flex: 1 1 280px;
      max-width: 340px;
      box-shadow: 0 0 14px #2222;
      color: #232342;
      padding: 20px;
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
      min-height: 152px;
    }
    .card .header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .card .desc {
      font-size: 14px;
      color: #444;
      margin-bottom: 10px;
      margin-top: 6px;
      flex: 1;
    }
    .card .footer {
      margin-top: 10px;
      font-size: 13px;
    }
    .card .footer a {
      color: #667eea;
      text-decoration: none;
      white-space: nowrap;
      font-weight: 500;
    }
    .card .footer a:hover {
      text-decoration: underline;
    }
    .tags {
      margin-top: 3px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .tags span {
      background: #667eea33;
      color: #32328a;
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }
    .card.db .footer a {
      display: none;
    }
    /* Мобильноадаптивность */
    @media (max-width:600px) {
      .container { padding: 2px; }
      .cards { flex-direction: column; }
      .card { max-width: none; min-width: unset; }
      .search-block { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <h1>DE Infrastructure Dashboard</h1>
    <p>Поиск и группировка сервисов по типу доступа</p>
  </header>
  <div class="container">
    <div class="search-block">
      <input type="text" id="search" placeholder="Введите запрос..." />
    </div>

    <div id="user-block">
      <div class="group-title">User сервисы</div>
      <div class="cards" id="user-cards"></div>
    </div>
    <div id="admin-block">
      <div class="group-title">Admin сервисы</div>
      <div class="cards" id="admin-cards"></div>
    </div>
    <div id="db-block">
      <div class="group-title">Базы данных</div>
      <div class="cards" id="db-cards"></div>
    </div>
  </div>

  <script>
    // Адрес api
    const API_URL = 'https://de-infra-api.de-infra.servehttp.com/api';
    function escapeHtml(text) {
      var d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }
    let allServices = [];
    async function loadServices() {
      const r = await fetch(`${API_URL}/services?skip=0&limit=100`);
      const data = await r.json();
      allServices = Array.isArray(data) ? data : data.services;
      render();
    }
    function filterAndGroup(query) {
      query = query.trim().toLowerCase();
      let user = [], admin = [], db = [];
      allServices.forEach(s => {
        let match = !query || s.name.toLowerCase().includes(query) || (s.description && s.description.toLowerCase().includes(query));
        if (!match) return;
        if ((s.category||'').toLowerCase().includes('database') || ['Database','База данных','Database/Analytics','Analytics Database'].includes(s.category)) {
          db.push(s);
        } else if (s.access_level && s.access_level === 'admin') {
          admin.push(s);
        } else {
          user.push(s);
        }
      });
      return { user, admin, db };
    }
    function render() {
      const query = document.getElementById('search').value || '';
      const {user, admin, db} = filterAndGroup(query);

      const makeCards = arr => arr.map(s => `
        <div class="card${((s.category||'').toLowerCase().includes('database') ? ' db':'')}">
          <div class="header">${escapeHtml(s.name||'Без имени')}</div>
          <div class="desc">${escapeHtml(s.description||'Нет описания')}</div>
          <div class="tags">${(s.tags||[]).map(t=>`<span>${escapeHtml(t.name||'')}</span>`).join('')}</div>
          <div class="footer">
            ${s.url && !(s.category||'').toLowerCase().includes('database') ? `<a href="${s.url}" target="_blank">Открыть</a>` : ''}
          </div>
        </div>
      `).join('');
      document.getElementById('user-cards').innerHTML = makeCards(user);
      document.getElementById('admin-cards').innerHTML = makeCards(admin);
      document.getElementById('db-cards').innerHTML = makeCards(db);
    }
    document.getElementById('search').addEventListener('input', render);
    loadServices();
  </script>
</body>
</html>
