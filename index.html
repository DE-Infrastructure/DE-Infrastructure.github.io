<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-Infra Dashboard - Premium Dark Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(to bottom, rgba(30,30,50,0.95), rgba(20,20,35,0.8));
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            font-size: 32px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(99,102,241,0.1) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(99,102,241,0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99,102,241,0.2);
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filters {
            background: rgba(30,30,50,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 2fr 1.5fr 1.5fr auto;
            gap: 15px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .filter-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(99,102,241,0.6);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(99,102,241,0.2);
        }

        button {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* КАСТОМНЫЙ SELECT */
        .custom-select {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .select-trigger {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .select-trigger:hover {
            border-color: rgba(99,102,241,0.6);
            background: rgba(255,255,255,0.08);
        }

        .select-trigger.active {
            border-color: rgba(99,102,241,0.8);
            background: rgba(99,102,241,0.1);
        }

        .select-arrow {
            pointer-events: none;
            font-size: 12px;
            transition: transform 0.3s ease;
        }

        .select-arrow.rotate {
            transform: rotate(180deg);
        }

        .select-dropdown {
            position: absolute;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(50,50,80,0.98) 0%, rgba(40,40,65,0.98) 100%);
            border: 1px solid rgba(99,102,241,0.4);
            border-radius: 8px;
            display: none;
            z-index: 1000;
            box-shadow: 0 16px 48px rgba(0,0,0,0.3);
            max-height: 200px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            bottom: calc(100% + 8px);
        }

        .select-dropdown.bottom {
            bottom: auto;
            top: calc(100% + 8px);
        }

        .select-dropdown.active {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .select-option {
            padding: 12px 15px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .select-option:last-child {
            border-bottom: none;
        }

        .select-option:hover {
            background: rgba(99,102,241,0.2);
            color: #a5b4fc;
            padding-left: 20px;
        }

        .select-option.selected {
            background: rgba(99,102,241,0.3);
            color: #8b5cf6;
            font-weight: 600;
        }

        .checkbox {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(99,102,241,0.5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .select-option.selected .checkbox {
            background: rgba(99,102,241,0.5);
            border-color: rgba(99,102,241,0.8);
        }

        .tag-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .service-card {
            background: linear-gradient(135deg, rgba(50,50,80,0.5) 0%, rgba(40,40,65,0.5) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .service-card:hover {
            border-color: rgba(99,102,241,0.5);
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(99,102,241,0.15);
            background: linear-gradient(135deg, rgba(60,60,100,0.6) 0%, rgba(50,50,80,0.6) 100%);
        }

        .service-header {
            padding: 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .service-icon {
            font-size: 40px;
            flex-shrink: 0;
        }

        .service-title-group {
            flex: 1;
        }

        .service-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .service-provider {
            font-size: 12px;
            color: #888;
        }

        .provider-badge {
            background: rgba(99,102,241,0.2);
            color: #a5b4fc;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            color: #888;
            padding: 0;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
            color: #fbbf24;
        }

        .favorite-btn.active {
            color: #fbbf24;
        }

        .service-body {
            padding: 20px;
            flex: 1;
        }

        .service-description {
            font-size: 14px;
            line-height: 1.5;
            color: #aaa;
            margin-bottom: 15px;
            min-height: 60px;
        }

        .service-description.empty {
            color: #666;
            font-style: italic;
        }

        .service-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .service-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .service-link {
            color: #6366f1;
            text-decoration: none;
            transition: color 0.2s;
        }

        .service-link:hover {
            color: #8b5cf6;
            text-decoration: underline;
        }

        .action-btn {
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.3);
            color: #a5b4fc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(99,102,241,0.3);
            border-color: rgba(99,102,241,0.5);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <span>DE-Infra Dashboard</span>
            </div>
            <div class="header-controls">
                <div class="status">
                    <span class="status-dot"></span>
                    <span id="api-status">API: Ready</span>
                </div>
                <div class="status">
                    <span id="last-sync">Last sync: -</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Всего сервисов</div>
                <div class="stat-value" id="total-services">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Docker</div>
                <div class="stat-value" id="docker-services">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Admin</div>
                <div class="stat-value" id="admin-services">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Избранное</div>
                <div class="stat-value" id="favorite-count">0</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Поиск</label>
                <input type="text" id="search-input" placeholder="Поиск по названию или описанию...">
            </div>
            <div class="filter-group">
                <label class="filter-label">Тэги</label>
                <div class="custom-select" id="tagFilter">
                    <div class="select-trigger">
                        <span id="tagValue">Все тэги</span>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-dropdown" id="tagDropdown">
                    </div>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">Уровень</label>
                <div class="custom-select" id="levelFilter">
                    <div class="select-trigger">
                        <span id="levelValue">Все</span>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-dropdown">
                        <div class="select-option selected" data-value="">Все</div>
                        <div class="select-option" data-value="admin">Admin</div>
                        <div class="select-option" data-value="user">User</div>
                    </div>
                </div>
            </div>
            <button onclick="syncTraefik()" id="sync-btn">⚡ Sync Traefik</button>
        </div>

        <div class="services-grid" id="servicesGrid"></div>
    </div>

    <script>
        const API_URL = 'https://de-infra-api.de-infra.servehttp.com/api';
        let services = [];
        let allTags = [];
        let filters = {
            tags: [],
            level: ''
        };

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const stats = await response.json();
                document.getElementById('total-services').textContent = stats.total_services || 0;
                document.getElementById('docker-services').textContent = stats.docker_services || 0;
                document.getElementById('admin-services').textContent = stats.admin_services || 0;
                document.getElementById('favorite-count').textContent = stats.favorite_count || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadServices() {
            try {
                const response = await fetch(`${API_URL}/services?skip=0&limit=100`);
                const data = await response.json();
                services = Array.isArray(data) ? data : [];
                
                // Собрать все уникальные тэги
                allTags = [];
                const tagsSet = new Set();
                services.forEach(s => {
                    if (s.tags && s.tags.length) {
                        s.tags.forEach(tag => {
                            tagsSet.add(JSON.stringify(tag));
                        });
                    }
                });
                allTags = Array.from(tagsSet).map(t => JSON.parse(t));
                
                // Инициализировать dropdown тэгов
                initTagDropdown();
                
                renderServices(services);
                document.getElementById('last-sync').textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('Failed to load services:', error);
            }
        }

        function initTagDropdown() {
            const dropdown = document.getElementById('tagDropdown');
            dropdown.innerHTML = allTags.map(tag => `
                <div class="select-option" data-value="${tag.id}">
                    <div class="checkbox"></div>
                    <span class="tag-color" style="background-color: ${tag.color || '#6366f1'}"></span>
                    <span>${tag.icon || '🏷️'} ${tag.name}</span>
                </div>
            `).join('');

            // Добавить обработчики
            dropdown.querySelectorAll('.select-option').forEach(option => {
                option.addEventListener('click', () => {
                    const tagId = option.dataset.value;
                    
                    if (filters.tags.includes(tagId)) {
                        filters.tags = filters.tags.filter(t => t !== tagId);
                        option.classList.remove('selected');
                    } else {
                        filters.tags.push(tagId);
                        option.classList.add('selected');
                    }
                    
                    updateTagDisplayText();
                    filterServices();
                });
            });
        }

        function updateTagDisplayText() {
            const tagValue = document.getElementById('tagValue');
            if (filters.tags.length === 0) {
                tagValue.textContent = 'Все тэги';
            } else if (filters.tags.length === 1) {
                const tag = allTags.find(t => t.id === filters.tags[0]);
                tagValue.textContent = `${tag.icon || '🏷️'} ${tag.name}`;
            } else {
                tagValue.textContent = `${filters.tags.length} тэгов выбрано`;
            }
        }

        function renderServices(servicesToRender) {
            const grid = document.getElementById('servicesGrid');
            
            if (!servicesToRender.length) {
                grid.innerHTML = '<div class="no-results">🔍 Сервисы не найдены</div>';
                return;
            }

            grid.innerHTML = servicesToRender.map(service => `
                <div class="service-card">
                    <div class="service-header">
                        <div class="service-icon">${service.icon || '📦'}</div>
                        <div class="service-title-group">
                            <div class="service-name">${service.name}</div>
                            <div class="service-provider">
                                <span class="provider-badge">${service.provider}</span>
                            </div>
                        </div>
                        <button class="favorite-btn ${service.is_favorite ? 'active' : ''}" 
                                onclick="toggleFavorite('${service.id}')">
                            ${service.is_favorite ? '⭐' : '☆'}
                        </button>
                    </div>
                    <div class="service-body">
                        <div class="service-description ${!service.description ? 'empty' : ''}">
                            ${service.description || 'Нет описания'}
                        </div>
                        ${service.tags && service.tags.length ? `
                            <div class="service-tags">
                                ${service.tags.map(tag => `<span class="tag" style="background: ${tag.color ? tag.color + '30' : 'rgba(99,102,241,0.15)'}; color: ${tag.color || '#a5b4fc'}">${tag.icon || '🏷️'} ${tag.name}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="service-footer">
                        <div>
                            ${service.url ? `<a href="${service.url}" target="_blank" class="service-link">Открыть →</a>` : 'No URL'}
                        </div>
                        ${service.url ? `<span class="action-btn" onclick="copyUrl('${service.url}')">📋</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function filterServices() {
            const search = document.getElementById('search-input').value.toLowerCase();

            const filtered = services.filter(s => {
                const matchSearch = !search || s.name.toLowerCase().includes(search) || 
                                   (s.description && s.description.toLowerCase().includes(search));
                const matchLevel = !filters.level || s.access_level === filters.level;
                
                // Фильтр по тэгам: если выбраны тэги, показать только сервисы с этими тэгами
                let matchTags = true;
                if (filters.tags.length > 0) {
                    const serviceTags = s.tags ? s.tags.map(t => t.id) : [];
                    matchTags = filters.tags.some(tagId => serviceTags.includes(tagId));
                }
                
                return matchSearch && matchLevel && matchTags;
            });

            renderServices(filtered);
        }

        async function toggleFavorite(serviceId) {
            try {
                await fetch(`${API_URL}/services/${serviceId}/favorite`, { method: 'POST' });
                await loadServices();
                await loadStats();
            } catch (error) {
                console.error('Failed to toggle favorite:', error);
            }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url);
            alert('URL скопирован!');
        }

        async function syncTraefik() {
            const btn = document.getElementById('sync-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Синхронизация...';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 2000));
                await loadServices();
                await loadStats();
                document.getElementById('last-sync').textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('Sync error:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '⚡ Sync Traefik';
            }
        }

        function initCustomSelects() {
            document.querySelectorAll('.custom-select').forEach(selectElement => {
                const trigger = selectElement.querySelector('.select-trigger');
                const dropdown = selectElement.querySelector('.select-dropdown');
                const arrow = trigger.querySelector('.select-arrow');
                const selectId = selectElement.id;

                trigger.addEventListener('click', () => {
                    const rect = selectElement.getBoundingClientRect();
                    const spaceBelow = window.innerHeight - rect.bottom;
                    
                    if (spaceBelow < 200) {
                        dropdown.classList.add('bottom');
                    } else {
                        dropdown.classList.remove('bottom');
                    }

                    dropdown.classList.toggle('active');
                    trigger.classList.toggle('active');
                    arrow.classList.toggle('rotate');
                });

                // Для простых select'ов (не tag)
                if (selectId !== 'tagFilter') {
                    dropdown.querySelectorAll('.select-option').forEach(option => {
                        option.addEventListener('click', () => {
                            dropdown.querySelectorAll('.select-option').forEach(o => o.classList.remove('selected'));
                            option.classList.add('selected');
                            
                            const valueDisplay = trigger.querySelector('span:first-child');
                            valueDisplay.textContent = option.textContent;
                            
                            const value = option.dataset.value;
                            if (selectId === 'levelFilter') {
                                filters.level = value;
                            }

                            dropdown.classList.remove('active');
                            trigger.classList.remove('active');
                            arrow.classList.remove('rotate');
                            filterServices();
                        });
                    });
                }

                document.addEventListener('click', (e) => {
                    if (!selectElement.contains(e.target)) {
                        dropdown.classList.remove('active');
                        trigger.classList.remove('active');
                        arrow.classList.remove('rotate');
                    }
                });
            });
        }

        document.getElementById('search-input').addEventListener('input', filterServices);

        loadStats();
        loadServices();
        initCustomSelects();

        setInterval(() => {
            loadStats();
            loadServices();
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
