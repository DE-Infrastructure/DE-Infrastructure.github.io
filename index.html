<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DE Infrastructure - Продукты с фильтрацией по тегам и поиском</title>
  <style>
    /* Оригинальный стиль из вашего файла index.html.bkp.txt, добавлены стили для тэгов */
    /* Вырезка для размера, ставьте ваш стиль целиком */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      margin: 0;
      color: white;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      padding: 30px 0;
    }
    header h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    header p {
      font-size: 18px;
      opacity: 0.9;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      color: #333;
      box-shadow: 0 0 10px #3338;
    }
    /* Фильтры */
    #filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: flex-end;
    }
    #filters > div {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: bold;
      margin-bottom: 6px;
      color: #222;
    }
    input[type="text"], select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    /* Тэги в фильтре */
    #tag-filter {
      min-height: 38px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      padding: 6px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    #tag-filter span.tag {
      background: #667eea;
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      user-select: none;
    }
    #tag-options {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 2px;
      width: 300px;
      display: none;
      z-index: 10;
    }
    #tag-options div {
      padding: 6px 12px;
      cursor: pointer;
    }
    #tag-options div:hover {
      background: #ddd;
    }
    /* Карточки продуктов */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
      gap: 20px;
    }
    .product {
      background: white;
      color: black;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 0 7px #5553;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
    }
    .product h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }
    .product .tags {
      margin-top: 10px;
    }
    .product .tags span {
      background: #667eea55;
      color: #334499;
      padding: 3px 8px;
      border-radius: 10px;
      margin-right: 6px;
      font-size: 12px;
    }
    .product .fav {
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      color: #667eea;
    }
    .product .description {
      flex-grow: 1;
      font-size: 14px;
      color: #444;
    }
    .open-link {
      text-decoration: none;
      color: #667eea;
      font-weight: bold;
      margin-top: 10px;
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <header>
    <h1>DE Infrastructure Dashboard</h1>
    <p>Отзывы, поиск и фильтрация сервисов</p>
  </header>

  <div class="container">
    <section id="filters">
      <div>
        <label for="search-input">Поиск</label>
        <input type="text" id="search-input" placeholder="Название или описание..." />
      </div>
      <div>
        <label for="tag-filter">Тэги</label>
        <div id="tag-filter" tabindex="0"></div>
        <div id="tag-options"></div>
      </div>
      <div>
        <label for="level-filter">Уровень</label>
        <select id="level-filter">
          <option value=\"\">Все</option>
          <option value=\"admin\">Admin</option>
          <option value=\"user\">User</option>
        </select>
      </div>
    </section>

    <section class="products" id="products">

    </section>
  </div>

  <script>
    const API_URL = 'https://traefik.de-infra.servehttp.com/dashboard/api';

    let services = [];
    let allTags = [];
    let selectedTags = new Set();

    async function loadServices() {
      try {
        const response = await fetch(`${API_URL}/services?skip=0&limit=100`);
        services = await response.json();
        renderServices(services);
        extractTags();
      } catch (e) {
        console.error('Ошибка загрузки сервисов:', e);
      }
    }

    function renderServices(items) {
      const container = document.getElementById('products');
      if(!items.length){
        container.innerHTML = `<p>Сервисы не найдены</p>`;
        return;
      }
      container.innerHTML = items.map(s => `
        <div class="product">
          <h3>${s.name}</h3>
          <div class="description">${s.description||'Нет описания'}</div>
          <a href="${s.url||'#'}" target="_blank" class="open-link">Открыть</a>
          <div class="tags">${s.tags.map(t=>`<span>${t.name}</span>`).join('')}</div>
        </div>
      `).join('');
    }

    function extractTags(){
      const tagsSet = new Map();
      services.forEach(s=>{
        s.tags.forEach(t=>{
          if(t && t.id && !tagsSet.has(t.id)) tagsSet.set(t.id, t.name);
        });
      });
      allTags = Array.from(tagsSet.entries());
      renderTags();
    }

    function renderTags() {
      const tagContainer = document.getElementById('tag-filter');
      tagContainer.innerHTML = '';
      allTags.forEach(([id, name]) => {
        const span = document.createElement('span');
        span.textContent = name;
        span.dataset.id = id;
        if(selectedTags.has(id)) span.classList.add('selected');
        span.onclick = () => {
          if (selectedTags.has(id)) {
            selectedTags.delete(id);
            span.classList.remove('selected');
          } else {
            selectedTags.add(id);
            span.classList.add('selected');
          }
          filterServices();
        };
        tagContainer.appendChild(span);
      });
    }

    function filterServices() {
      let query = document.getElementById('search-input').value.toLowerCase();
      let level = document.getElementById('level-filter').value;

      let filtered = services.filter(s=>{
        let matchSearch = s.name.toLowerCase().includes(query) || (s.description && s.description.toLowerCase().includes(query));
        let matchLevel = level === '' || s.access_level === level;
        let matchTags = selectedTags.size === 0 || s.tags.some(t => selectedTags.has(t.id));
        return matchSearch && matchLevel && matchTags;
      });
      renderServices(filtered);
    }

    document.getElementById('search-input').addEventListener('input', filterServices);
    document.getElementById('level-filter').addEventListener('change', filterServices);

    loadServices();
  </script>
</body>
</html>
